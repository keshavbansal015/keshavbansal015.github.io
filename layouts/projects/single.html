{{ define "main" }}

<article class="single-post project-post">

    <header class="post-header">
        <div class="project-meta-header">
            <span class="project-code-badge">{{ .Params.code }}</span>
        </div>

        <h1>{{ .Title }}</h1>
        <p class="project-summary">{{ .Params.summary }}</p>

        {{ with .Params.tags }}
        <div class="tags" style="margin-top: var(--space-4);">
            {{ range . }}
                <a href="/tags/{{ . | urlize }}" class="tag">{{ . }}</a>
            {{ end }}
        </div>
        {{ end }}
    </header>

    {{ with .Params.image }}
    <div class="project-image" style="display: flex; justify-content: center; margin-bottom: var(--space-6);">
        <img src="{{ . }}" alt="{{ $.Title }}" style="max-width: 100%; height: auto; max-height: 400px; object-fit: contain; border-radius: var(--radius-4);">
    </div>
    {{ end }}

    <div class="post-content">
        {{ .Content }}
    </div>

</article>

{{ end }}
