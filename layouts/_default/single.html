{{ define "main" }}
<article class="single-post animate-fade-in">
    <header class="post-header">
        <h1>{{ .Title }}</h1>
        <div class="post-meta">
            <span>{{ .Date.Format "Jan 2, 2006" }}</span>
        </div>
    </header>
    <div class="post-content">
        {{ .Content }}
    </div>
</article>
{{ end }}
