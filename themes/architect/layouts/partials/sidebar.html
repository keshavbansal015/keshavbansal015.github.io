<aside class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-profile">
            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100&h=100&fit=crop&crop=face" alt="{{ .Site.Params.author }}">
            <div>
                <h2>{{ .Site.Params.author }}</h2>
                <p>Backend Architect</p>
            </div>
        </div>
    </div>
    
    <nav class="sidebar-nav">
        <a href="{{ "/" | relURL }}" class="{{ if .IsHome }}active{{ end }}">
            <span class="material-symbols-outlined">home</span>
            <span>Home</span>
        </a>
        <a href="{{ "/blogs/" | relURL }}" class="{{ if eq .Section "blogs" }}active{{ end }}">
            <span class="material-symbols-outlined">article</span>
            <span>Blogs</span>
        </a>
        <a href="{{ "/projects/" | relURL }}" class="{{ if eq .Section "projects" }}active{{ end }}">
            <span class="material-symbols-outlined">account_tree</span>
            <span>Projects</span>
        </a>
        <a href="{{ "/gallery/" | relURL }}" class="{{ if eq .Section "gallery" }}active{{ end }}">
            <span class="material-symbols-outlined">photo_library</span>
            <span>Gallery</span>
        </a>
        <a href="{{ "/resume/" | relURL }}" class="{{ if eq .Section "resume" }}active{{ end }}">
            <span class="material-symbols-outlined">description</span>
            <span>Resume</span>
        </a>
        <a href="{{ "/contact/" | relURL }}" class="{{ if eq .Section "contact" }}active{{ end }}">
            <span class="material-symbols-outlined">mail</span>
            <span>Contact</span>
        </a>
    </nav>
    
    <div class="sidebar-footer">
        <div class="sidebar-social">
            <a href="https://github.com/{{ .Site.Params.github }}" target="_blank">GH</a>
            <a href="https://linkedin.com/in/{{ .Site.Params.linkedin }}" target="_blank">LI</a>
        </div>
    </div>
</aside>
