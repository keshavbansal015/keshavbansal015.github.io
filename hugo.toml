baseURL = 'https://keshavbansal015.github.io/'
languageCode = 'en-us'
title = 'Software Engineer'
theme = 'github-style'
relativeURLs = false
canonifyURLs = true

[params]
    author = "Keshav Bansal"
    description = "Technical portfolio showcasing distributed systems engineering and backend architecture expertise."
    github = "keshavbansal015"
    linkedin = "keshav-bansal-015"

[markup]
    [markup.goldmark]
        [markup.goldmark.renderer]
            unsafe = true

[permalinks]
    blogs = "/blogs/:slug/"
    projects = "/projects/:slug/"

[menu]
    [[menu.main]]
        name = "Home"
        url = "/"
        weight = 10
    [[menu.main]]
        name = "Blogs"
        url = "/blogs/"
        weight = 20
    [[menu.main]]
        name = "Projects"
        url = "/projects/"
        weight = 30
    [[menu.main]]
        name = "Resume"
        url = "/resume/"
        weight = 40
    [[menu.main]]
        name = "Gallery"
        url = "/gallery/"
        weight = 50
    [[menu.main]]
        name = "Contact"
        url = "/contact/"
        weight = 60

[module]
  [[module.mounts]]
    source = "themes/github-style/layouts"
    target = "layouts"
  [[module.mounts]]
    source = "themes/github-style/assets"
    target = "assets"
  [[module.mounts]]
    source = "themes/github-style/static"
    target = "static"