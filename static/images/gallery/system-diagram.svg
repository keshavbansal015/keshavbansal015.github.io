<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#f8f7f4"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#1a1f2e">Microservices Architecture</text>
  
  <!-- API Gateway -->
  <rect x="350" y="80" width="100" height="50" rx="8" fill="#1a1f2e"/>
  <text x="400" y="110" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#e2e8f0">API Gateway</text>
  
  <!-- Services -->
  <rect x="100" y="180" width="120" height="60" rx="6" fill="#a68b5b"/>
  <text x="160" y="205" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#1a1f2e">User Service</text>
  <text x="160" y="225" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#3d3020">Go + PostgreSQL</text>
  
  <rect x="250" y="180" width="120" height="60" rx="6" fill="#a68b5b"/>
  <text x="310" y="205" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#1a1f2e">Order Service</text>
  <text x="310" y="225" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#3d3020">Java + MongoDB</text>
  
  <rect x="400" y="180" width="120" height="60" rx="6" fill="#a68b5b"/>
  <text x="460" y="205" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#1a1f2e">Payment Service</text>
  <text x="460" y="225" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#3d3020">Python + Redis</text>
  
  <rect x="550" y="180" width="120" height="60" rx="6" fill="#a68b5b"/>
  <text x="610" y="205" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#1a1f2e">Notification</text>
  <text x="610" y="225" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#3d3020">Node.js + SQS</text>
  
  <!-- Event Bus -->
  <rect x="200" y="300" width="400" height="60" rx="8" fill="#2d3748"/>
  <text x="400" y="335" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#e2e8f0">Event Bus (Apache Kafka)</text>
  
  <!-- Databases -->
  <rect x="120" y="420" width="100" height="50" rx="6" fill="#4a5568"/>
  <text x="170" y="445" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0">PostgreSQL</text>
  <text x="170" y="460" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#a0aec0">Primary + Replica</text>
  
  <rect x="280" y="420" width="100" height="50" rx="6" fill="#4a5568"/>
  <text x="330" y="445" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0">MongoDB</text>
  <text x="330" y="460" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#a0aec0">Sharded Cluster</text>
  
  <rect x="440" y="420" width="100" height="50" rx="6" fill="#4a5568"/>
  <text x="490" y="445" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0">Redis</text>
  <text x="490" y="460" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#a0aec0">Cluster Mode</text>
  
  <rect x="600" y="420" width="100" height="50" rx="6" fill="#4a5568"/>
  <text x="650" y="445" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0">S3 + CDN</text>
  <text x="650" y="460" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#a0aec0">Static Assets</text>
  
  <!-- Connection Lines -->
  <line x1="400" y1="130" x2="160" y2="180" stroke="#a68b5b" stroke-width="2"/>
  <line x1="400" y1="130" x2="310" y2="180" stroke="#a68b5b" stroke-width="2"/>
  <line x1="400" y1="130" x2="460" y2="180" stroke="#a68b5b" stroke-width="2"/>
  <line x1="400" y1="130" x2="610" y2="180" stroke="#a68b5b" stroke-width="2"/>
  
  <line x1="160" y1="240" x2="400" y2="300" stroke="#a68b5b" stroke-width="2"/>
  <line x1="310" y1="240" x2="400" y2="300" stroke="#a68b5b" stroke-width="2"/>
  <line x1="460" y1="240" x2="400" y2="300" stroke="#a68b5b" stroke-width="2"/>
  <line x1="610" y1="240" x2="400" y2="300" stroke="#a68b5b" stroke-width="2"/>
  
  <line x1="300" y1="360" x2="170" y2="420" stroke="#2d3748" stroke-width="2"/>
  <line x1="400" y1="360" x2="330" y2="420" stroke="#2d3748" stroke-width="2"/>
  <line x1="500" y1="360" x2="490" y2="420" stroke="#2d3748" stroke-width="2"/>
  <line x1="550" y1="360" x2="650" y2="420" stroke="#2d3748" stroke-width="2"/>
</svg>
