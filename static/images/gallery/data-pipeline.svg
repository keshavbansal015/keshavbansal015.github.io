<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#f8f7f4"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#1a1f2e">Real-time Data Pipeline</text>
  
  <!-- Source: Web App -->
  <rect x="50" y="100" width="120" height="60" rx="8" fill="#2d3748"/>
  <text x="110" y="125" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0">Web Application</text>
  <text x="110" y="145" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#a0aec0">User Events</text>
  
  <!-- Source: Mobile -->
  <rect x="50" y="180" width="120" height="60" rx="8" fill="#2d3748"/>
  <text x="110" y="205" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0">Mobile App</text>
  <text x="110" y="225" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#a0aec0">Analytics Events</text>
  
  <!-- Source: IoT -->
  <rect x="50" y="260" width="120" height="60" rx="8" fill="#2d3748"/>
  <text x="110" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0">IoT Devices</text>
  <text x="110" y="305" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#a0aec0">Sensor Data</text>
  
  <!-- Kafka -->
  <rect x="250" y="150" width="140" height="140" rx="8" fill="#a68b5b"/>
  <text x="320" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#1a1f2e">Kafka</text>
  <text x="320" y="225" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#3d3020">10M+ events/day</text>
  <text x="320" y="245" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#3d3020">3 partitions</text>
  
  <!-- Arrows to Kafka -->
  <path d="M170 130 L250 220" stroke="#a68b5b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M170 210 L250 220" stroke="#a68b5b" stroke-width="2"/>
  <path d="M170 290 L250 220" stroke="#a68b5b" stroke-width="2"/>
  
  <!-- Kafka Streams -->
  <rect x="450" y="150" width="140" height="140" rx="8" fill="#1a1f2e"/>
  <text x="520" y="190" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#e2e8f0">Kafka Streams</text>
  <text x="520" y="215" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#a0aec0">Aggregation</text>
  <text x="520" y="235" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#a0aec0">Windowing</text>
  <text x="520" y="255" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#a0aec0">Enrichment</text>
  
  <path d="M390 220 L450 220" stroke="#a68b5b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- ClickHouse -->
  <rect x="650" y="150" width="120" height="140" rx="8" fill="#2d3748"/>
  <text x="710" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#e2e8f0">ClickHouse</text>
  <text x="710" y="225" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#a0aec0">Columnar Store</text>
  <text x="710" y="245" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#a0aec0">Sub-second</text>
  <text x="710" y="265" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#a0aec0">Queries</text>
  
  <path d="M590 220 L650 220" stroke="#a68b5b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Grafana Dashboard -->
  <rect x="50" y="380" width="700" height="180" rx="8" fill="#e2ddd4"/>
  <text x="400" y="410" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#1a1f2e">Grafana Dashboard</text>
  
  <!-- Chart 1 -->
  <rect x="70" y="430" width="200" height="110" rx="4" fill="#fff"/>
  <text x="170" y="450" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#1a1f2e">Events/Second</text>
  <path d="M90 540 Q110 520 130 530 T170 510 T210 520" stroke="#a68b5b" stroke-width="2" fill="none"/>
  <path d="M90 540 Q110 530 130 535 T170 525 T210 530" stroke="#2d3748" stroke-width="2" fill="none"/>
  <text x="90" y="555" font-family="Inter, sans-serif" font-size="9" fill="#4a5568">10K</text>
  <text x="140" y="555" font-family="Inter, sans-serif" font-size="9" fill="#4a5568">50K</text>
  <text x="190" y="555" font-family="Inter, sans-serif" font-size="9" fill="#4a5568">100K</text>
  
  <!-- Chart 2 -->
  <rect x="290" y="430" width="200" height="110" rx="4" fill="#fff"/>
  <text x="390" y="450" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#1a1f2e">Latency (ms)</text>
  <rect x="310" y="480" width="30" height="50" rx="2" fill="#a68b5b"/>
  <rect x="350" y="470" width="30" height="60" rx="2" fill="#a68b5b"/>
  <rect x="390" y="460" width="30" height="70" rx="2" fill="#a68b5b"/>
  <rect x="430" y="485" width="30" height="45" rx="2" fill="#2d3748"/>
  <rect x="470" y="500" width="30" height="30" rx="2" fill="#2d3748"/>
  
  <!-- Chart 3 -->
  <rect x="510" y="430" width="220" height="110" rx="4" fill="#fff"/>
  <text x="620" y="450" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#1a1f2e">Top Events</text>
  <rect x="530" y="470" width="140" height="15" rx="2" fill="#a68b5b"/>
  <text x="680" y="482" font-family="Inter, sans-serif" font-size="9" fill="#4a5568">page_view (45%)</text>
  <rect x="530" y="492" width="100" height="15" rx="2" fill="#2d3748"/>
  <text x="640" y="504" font-family="Inter, sans-serif" font-size="9" fill="#4a5568">click (32%)</text>
  <rect x="530" y="514" width="60" height="15" rx="2" fill="#4a5568"/>
  <text x="600" y="526" font-family="Inter, sans-serif" font-size="9" fill="#4a5568">purchase (15%)</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#a68b5b"/>
    </marker>
  </defs>
</svg>
