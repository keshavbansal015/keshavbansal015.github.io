<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#f8f7f4"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#1a1f2e">Multi-Region Kubernetes Infrastructure</text>
  
  <!-- Region 1: US West -->
  <rect x="50" y="80" width="340" height="220" rx="8" fill="#e2ddd4"/>
  <text x="220" y="105" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#1a1f2e">us-west-2 (Primary)</text>
  
  <!-- K8s Cluster 1 -->
  <rect x="70" y="125" width="140" height="150" rx="6" fill="#1a1f2e"/>
  <text x="140" y="145" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#a68b5b">Kubernetes</text>
  
  <!-- Pods -->
  <rect x="85" y="160" width="50" height="25" rx="3" fill="#2d3748"/>
  <text x="110" y="177" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#e2e8f0">api-1</text>
  <rect x="145" y="160" width="50" height="25" rx="3" fill="#2d3748"/>
  <text x="170" y="177" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#e2e8f0">api-2</text>
  <rect x="85" y="195" width="50" height="25" rx="3" fill="#2d3748"/>
  <text x="110" y="212" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#e2e8f0">worker-1</text>
  <rect x="145" y="195" width="50" height="25" rx="3" fill="#2d3748"/>
  <text x="170" y="212" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#e2e8f0">worker-2</text>
  
  <!-- DB -->
  <rect x="230" y="125" width="140" height="70" rx="6" fill="#2d3748"/>
  <text x="300" y="150" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0">PostgreSQL</text>
  <text x="300" y="170" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#a0aec0">Primary + 2 Replicas</text>
  
  <!-- Redis -->
  <rect x="230" y="205" width="140" height="70" rx="6" fill="#a68b5b"/>
  <text x="300" y="230" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#1a1f2e">Redis Cluster</text>
  <text x="300" y="250" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#3d3020">6 Nodes (3 Masters)</text>
  
  <!-- Region 2: EU -->
  <rect x="410" y="80" width="340" height="220" rx="8" fill="#e2ddd4"/>
  <text x="580" y="105" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#1a1f2e">eu-west-1 (Secondary)</text>
  
  <!-- K8s Cluster 2 -->
  <rect x="430" y="125" width="140" height="150" rx="6" fill="#1a1f2e"/>
  <text x="500" y="145" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#a68b5b">Kubernetes</text>
  
  <!-- Pods -->
  <rect x="445" y="160" width="50" height="25" rx="3" fill="#2d3748"/>
  <text x="470" y="177" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#e2e8f0">api-1</text>
  <rect x="505" y="160" width="50" height="25" rx="3" fill="#2d3748"/>
  <text x="530" y="177" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#e2e8f0">api-2</text>
  <rect x="445" y="195" width="50" height="25" rx="3" fill="#2d3748"/>
  <text x="470" y="212" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#e2e8f0">worker-1</text>
  <rect x="505" y="195" width="50" height="25" rx="3" fill="#2d3748"/>
  <text x="530" y="212" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#e2e8f0">worker-2</text>
  
  <!-- Read Replica -->
  <rect x="590" y="125" width="140" height="70" rx="6" fill="#4a5568"/>
  <text x="660" y="150" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0">PostgreSQL</text>
  <text x="660" y="170" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#a0aec0">Read Replica</text>
  
  <!-- Redis -->
  <rect x="590" y="205" width="140" height="70" rx="6" fill="#a68b5b"/>
  <text x="660" y="230" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#1a1f2e">Redis Cluster</text>
  <text x="660" y="250" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#3d3020">6 Nodes (3 Masters)</text>
  
  <!-- Connection -->
  <path d="M390 190 L410 190" stroke="#a68b5b" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="400" y="180" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#a68b5b">Replication</text>
  
  <!-- CDN -->
  <rect x="50" y="330" width="700" height="100" rx="8" fill="#2d3748"/>
  <text x="400" y="360" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#e2e8f0">Global CDN (CloudFront)</text>
  
  <!-- Edge Locations -->
  <circle cx="120" cy="400" r="25" fill="#a68b5b"/>
  <text x="120" y="406" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#1a1f2e">SFO</text>
  <circle cx="220" cy="400" r="25" fill="#a68b5b"/>
  <text x="220" y="406" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#1a1f2e">NYC</text>
  <circle cx="320" cy="400" r="25" fill="#a68b5b"/>
  <text x="320" y="406" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#1a1f2e">LON</text>
  <circle cx="420" cy="400" r="25" fill="#a68b5b"/>
  <text x="420" y="406" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#1a1f2e">FRA</text>
  <circle cx="520" cy="400" r="25" fill="#a68b5b"/>
  <text x="520" y="406" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#1a1f2e">SIN</text>
  <circle cx="620" cy="400" r="25" fill="#a68b5b"/>
  <text x="620" y="406" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#1a1f2e">TYO</text>
  <circle cx="720" cy="400" r="25" fill="#a68b5b"/>
  <text x="720" y="406" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#1a1f2e">SYD</text>
  
  <!-- Load Balancer -->
  <rect x="50" y="460" width="700" height="110" rx="8" fill="#e2ddd4"/>
  <text x="400" y="490" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#1a1f2e">Global Load Balancer (Route 53)</text>
  
  <!-- Health Checks -->
  <rect x="100" y="510" width="200" height="40" rx="4" fill="#1a1f2e"/>
  <text x="200" y="535" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#68d391">Health Check: PASS</text>
  <rect x="320" y="510" width="200" height="40" rx="4" fill="#1a1f2e"/>
  <text x="420" y="535" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#68d391">Health Check: PASS</text>
  <rect x="540" y="510" width="150" height="40" rx="4" fill="#2d3748"/>
  <text x="615" y="535" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#f6e05e">Failover Ready</text>
</svg>
